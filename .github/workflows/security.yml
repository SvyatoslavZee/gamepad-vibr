name: Security checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  syntax:
    name: Syntax and manifest checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check bridge syntax
        run: node --check yandex-dualsense-haptics-bridge/bridge.js

      - name: Check injector syntax
        run: node --check yandex-dualsense-haptics-bridge/inject-devtools-bridge.js

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('yandex-dualsense-haptics-bridge/manifest.json', 'utf8')); console.log('manifest json ok')"

  codeql:
    name: CodeQL JavaScript analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
